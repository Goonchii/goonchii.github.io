  <body>
    <div class="center-screen" style="margin-top: -100px;">

                <button aria-label="Minimize"></button>
                <button aria-label="Maximize"></button>
                <button aria-label="Close"></button>
              </div>
            </div>
            <div class="window-body" style="background-color: white;">
              <div class="welcome" style="margin: 30px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 10px;">
                <p style="font-size: 50px; position: relative; z-index: 2;">welcome to my site !</p>

  </body>

<script>
    const colours = ["pink", "orange", "yellow", "green", "blue", "purple"];

    function rainbowText(id) {
        const el = document.getElementById(id);
        el.innerHTML = el.textContent.split("").map((letter, i) =>
            letter === " " ? " " : `<mark class="${colours[i % colours.length]}">${letter}</mark>`
        ).join("");
    }

    rainbowText("rainbow-text");
</script>
